<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agentic MCP Architecture</title>
    <style>
        body {
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .diagram-container {
            width: 900px;
            height: 600px;
            position: relative;
        }
        .node {
            fill: #161b22;
            stroke: #30363d;
            stroke-width: 2;
            rx: 12;
            transition: all 0.3s ease;
        }
        .node:hover {
            stroke: #58a6ff;
            filter: drop-shadow(0 0 10px rgba(88, 166, 255, 0.5));
        }
        .node-text {
            fill: #c9d1d9;
            font-size: 14px;
            font-weight: 600;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .node-subtext {
            fill: #8b949e;
            font-size: 11px;
            text-anchor: middle;
            dominant-baseline: middle;
        }
        .pulse-line {
            fill: none;
            stroke: #58a6ff;
            stroke-width: 2;
            stroke-dasharray: 8 8;
            animation: dash 2s linear infinite;
        }
        .pulse-line-db {
            fill: none;
            stroke: #3fb950;
            stroke-width: 2;
            stroke-dasharray: 8 8;
            animation: dash-reverse 2s linear infinite;
        }
        .pulse-line-mcp {
            fill: none;
            stroke: #d2a8ff;
            stroke-width: 2;
            stroke-dasharray: 8 8;
            animation: dash 2s linear infinite;
        }
        @keyframes dash {
            to { stroke-dashoffset: -16; }
        }
        @keyframes dash-reverse {
            to { stroke-dashoffset: 16; }
        }
        .watermark {
            fill: #8b949e;
            font-size: 12px;
            opacity: 0.5;
        }
        
        /* Floating animation for central agent */
        .core-agent {
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
    </style>
</head>
<body>
    <div class="diagram-container">
        <svg width="100%" height="100%" viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg">
            
            <!-- Watermark -->
            <text x="880" y="580" class="watermark" text-anchor="end">© Ambuj Kumar Tripathi - System Architecture</text>

            <!-- Connections (Lines) -->
            <!-- UI to API -->
            <path d="M 150 300 C 250 300, 300 300, 380 300" class="pulse-line" />
            
            <!-- API to Built-in Tools -->
            <path d="M 450 250 C 450 150, 600 150, 680 150" class="pulse-line" />
            
            <!-- API to MCP Tools -->
            <path d="M 450 350 C 450 450, 600 450, 680 450" class="pulse-line-mcp" />
            
            <!-- API to DB -->
            <path d="M 450 350 C 450 520, 300 520, 200 520" class="pulse-line-db" />

            <!-- Frontend UI -->
            <g transform="translate(30, 250)">
                <rect width="140" height="100" class="node" />
                <text x="70" y="40" class="node-text">Next.js UI</text>
                <text x="70" y="60" class="node-subtext">React + NextAuth</text>
                <text x="70" y="75" class="node-subtext">Port 3001</text>
            </g>

            <!-- Backend Core -->
            <g transform="translate(350, 230)" class="core-agent">
                <rect width="180" height="140" rx="20" class="node" style="stroke: #58a6ff; fill: #1c2128; stroke-width: 3;" />
                <text x="90" y="45" class="node-text" style="fill: #58a6ff; font-size: 16px;">Agentic Core</text>
                <text x="90" y="70" class="node-subtext">FastAPI (Port 8001)</text>
                <text x="90" y="90" class="node-subtext">LangGraph ReAct</text>
                <text x="90" y="110" class="node-subtext">LLM Orchestration</text>
            </g>

            <!-- Built-in Tools Cluster -->
            <g transform="translate(650, 60)">
                <rect width="200" height="180" class="node" style="stroke: #8b949e; stroke-dasharray: 4 4;" />
                <text x="100" y="30" class="node-text">Built-in Capabilities</text>
                
                <rect x="20" y="50" width="160" height="30" class="node" style="fill: #21262d" />
                <text x="100" y="65" class="node-subtext">Web Search (Tavily)</text>
                
                <rect x="20" y="90" width="160" height="30" class="node" style="fill: #21262d" />
                <text x="100" y="105" class="node-subtext">GitHub API Integration</text>
                
                <rect x="20" y="130" width="160" height="30" class="node" style="fill: #21262d" />
                <text x="100" y="145" class="node-subtext">Live Stock Data / Email</text>
            </g>

            <!-- MCP External Tools Cluster -->
            <g transform="translate(650, 360)">
                <rect width="200" height="140" class="node" style="stroke: #d2a8ff; stroke-width: 2;" />
                <text x="100" y="30" class="node-text" style="fill: #d2a8ff;">MCP Registry</text>
                <text x="100" y="50" class="node-subtext">Model Context Protocol</text>
                
                <rect x="20" y="70" width="160" height="40" class="node" style="fill: #21262d" />
                <text x="100" y="85" class="node-subtext">External SSE Servers</text>
                <text x="100" y="100" class="node-subtext">(Dynamic Discovery)</text>
            </g>

            <!-- Database -->
            <g transform="translate(60, 480)">
                <rect width="140" height="80" class="node" style="stroke: #3fb950;" />
                <text x="70" y="30" class="node-text" style="fill: #3fb950;">MongoDB Atlas</text>
                <text x="70" y="55" class="node-subtext">Chat History</text>
                <text x="70" y="70" class="node-subtext">30-Day TTL</text>
            </g>

        </svg>
    </div>
</body>
</html>
